version: '3.8'

services:
  front:
    image: ghcr.io/pedroprobolsas/piterlabs-front:latest
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.piterlabs_front.rule=Host(`ippmarketing.probolsas.co`)"
        - "traefik.http.routers.piterlabs_front.entrypoints=websecure"
        - "traefik.http.routers.piterlabs_front.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.piterlabs_front.loadbalancer.server.port=80"
        - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - probolsas

  api:
    image: ghcr.io/pedroprobolsas/piterlabs-api:latest
    environment:
      # Configurar con los valores reales del VPS
      # Opción A: una sola variable (recomendado)
      - DATABASE_URL=${DATABASE_URL}
      # Opción B: variables separadas (alternativa)
      # - DB_HOST=${DB_HOST}
      # - DB_PORT=${DB_PORT:-5432}
      # - DB_USER=${DB_USER}
      # - DB_PASSWORD=${DB_PASSWORD}
      # - DB_NAME=${DB_NAME:-probolsas_db}
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.piterlabs_api.rule=Host(`ippmarketing.probolsas.co`) && PathPrefix(`/api`)"
        - "traefik.http.routers.piterlabs_api.entrypoints=websecure"
        - "traefik.http.routers.piterlabs_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.piterlabs_api.loadbalancer.server.port=5050"
        - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - probolsas

networks:
  probolsas:
    external: true
