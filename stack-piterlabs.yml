version: '3.8'

services:
  front:
    image: ghcr.io/pedroprobolsas/piterlabs-front:latest
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        # HTTPS router
        - "traefik.http.routers.piterlabs-front.rule=Host(`ippmarketing.probolsas.co`)"
        - "traefik.http.routers.piterlabs-front.entrypoints=websecure"
        - "traefik.http.routers.piterlabs-front.tls=true"
        - "traefik.http.routers.piterlabs-front.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.piterlabs-front.loadbalancer.server.port=80"
        # HTTP router — needed for Let's Encrypt httpchallenge + redirect to HTTPS
        - "traefik.http.routers.piterlabs_front_http.rule=Host(`ippmarketing.probolsas.co`)"
        - "traefik.http.routers.piterlabs_front_http.entrypoints=web"
        - "traefik.http.routers.piterlabs_front_http.middlewares=redirect-to-https"
        # Redirect middleware
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
    networks:
      - probolsas

  api:
    image: ghcr.io/pedroprobolsas/piterlabs-api:latest
    environment:
      - DATABASE_URL=postgresql://probolsas_user:Probolsas2026@postgres:5432/probolsas_db
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=probolsas_db
      - PG_USER=probolsas_user
      - PG_PASSWORD=Probolsas2026
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.piterlabs_api.rule=Host(`ippmarketing.probolsas.co`) && PathPrefix(`/api`)"
        - "traefik.http.routers.piterlabs_api.entrypoints=websecure"
        - "traefik.http.routers.piterlabs_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.piterlabs_api.loadbalancer.server.port=5050"
        - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - probolsas

networks:
  probolsas:
    external: true
